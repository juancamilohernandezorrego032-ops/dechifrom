<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaPay - Inversiones Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/admin.css">
    <style>
        .map-section {
            width: 100%;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-dark);
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .map-section iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: invert(90%) hue-rotate(180deg) brightness(80%) contrast(150%); /* Hace que Google Maps luzca como tema oscuro y futurista */
        }
        
        .overlay-text {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--admin-accent);
            pointer-events: none;
        }

        .btn-delete {
            background: rgba(255, 75, 75, 0.1);
            color: #ff4b4b; margin: 0;
            border: 1px solid rgba(255, 75, 75, 0.3);
            padding: 8px 15px; border-radius: 10px; cursor: pointer; transition: 0.3s;
            font-weight: 600; display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-delete:hover { background: #ff4b4b; color: white; transform: scale(1.05); }
    </style>
</head>
<body>
    
    <div class="dashboard-layout animate-fade-in" style="grid-template-columns: 1fr; max-width: 1200px;">
        <main class="main-content" style="padding-right: 0;">
            
            <div class="header-admin">
                <h2><i class="fa-solid fa-earth-americas" style="color: var(--admin-accent);"></i> Hub Global de Inversiones</h2>
                <button class="btn-logout" onclick="window.close()" style="margin: 0; padding: 10px 25px;">
                    <i class="fa-solid fa-xmark"></i> Cerrar Pestaña
                </button>
            </div>

            <!-- GOOGLE MAPS EMBED CON FILTRO DARK MODE -->
            <div class="map-section glass-dark animate-fade-in">
                <div class="overlay-text">
                    <h3 style="color: var(--admin-accent); margin:0;">Zonas Geográficas de Operación</h3>
                    <p style="font-size: 0.8rem; color: rgba(255,255,255,0.7);">Rastreo satelital de compras mundiales</p>
                </div>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d193595.25280010994!2d-74.14448766164286!3d40.69766374828116!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c24fa5d33f083b%3A0xc80b8f06e177fe62!2sNueva%20York%2C%20EE.%20UU.!5e0!3m2!1ses!2sve!4v1713500000000!5m2!1ses!2sve" loading="lazy"></iframe>
            </div>

            <!-- GESTOR DE COMPRAS -->
            <div class="table-section glass-dark mt-container">
                <h3><i class="fa-solid fa-boxes-stacked"></i> Administrar mis Compras y Activos</h3>
                
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Fecha de Operación</th>
                                <th>Tipo / Artículo</th>
                                <th>Monto Invertido</th>
                                <th>Acción Inmediata</th>
                            </tr>
                        </thead>
                        <tbody id="inv-table-body">
                            <!-- Inyectado por JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="../assets/js/inversiones.js"></script>
</body>
</html>
