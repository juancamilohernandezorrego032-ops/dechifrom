<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaPay - Ajustes y Personalización</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/banco.css">
    <style>
        .settings-panel {
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--card-bg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 600; color: #cbd5e1; }
        
        .form-group input[type="text"], .form-group input[type="url"] {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--primary); }

        .color-picker-container { display: flex; align-items: center; gap: 20px; }
        
        .form-group input[type="color"] {
            width: 60px; height: 60px;
            border: none; border-radius: 12px;
            background: none; cursor: pointer;
        }
        
        .quick-colors { display: flex; gap: 12px; }
        .q-color {
            width: 35px; height: 35px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer; transition: 0.2s;
        }
        .q-color:hover { transform: scale(1.1); border-color: white; }

        .btn-save {
            width: auto; padding: 15px 40px; border-radius: 15px;
            background: linear-gradient(135deg, var(--primary), var(--primary-vivid));
            color: white; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; margin-top: 10px;
            font-size: 1.1rem;
        }
        .btn-save:hover { box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4); transform: translateY(-3px); }
    </style>
</head>
<body>
    
    <div class="dashboard-layout animate-fade-in">
        
        <!-- SIDEBAR -->
        <aside class="sidebar glass">
            <div class="brand">
                <i class="fa-solid fa-building-columns text-vivid"></i>
                <span>NovaPay</span>
            </div>
            
            <div class="user-profile">
                <div class="avatar-lg" id="sidebar-avatar"></div>
                <h3 id="sidebar-username"></h3>
                <p class="user-status text-vivid">Premium Account</p>
            </div>

            <nav class="side-nav">
                <a href="banco.html"><i class="fa-solid fa-house"></i> Inicio</a>
                <a href="#"><i class="fa-solid fa-wallet"></i> Billetera</a>
                <a href="inversiones.html" target="_blank"><i class="fa-solid fa-chart-line"></i> Inversiones</a>
                <a href="ajustes.html" class="active"><i class="fa-solid fa-gear"></i> Ajustes y Personalización</a>
            </nav>

            <button onclick="localStorage.clear(); window.location.href='../index.html'" class="btn-logout">
                <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
            </button>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content" style="grid-column: 2 / 4;">
            <div class="settings-panel glass">
                <h2 style="font-size: 2rem; margin-bottom: 10px;"><i class="fa-solid fa-paintbrush" style="color: var(--primary);"></i> Personaliza tu Cuenta Bancaria</h2>
                <p style="color: #94a3b8; margin-bottom: 40px; font-size: 1.1rem;">Configura el diseño, los colores de NovaPay y tu información a tu medida.</p>

                <div class="form-group">
                    <label>Nombre de Usuario</label>
                    <input type="text" id="config-name" placeholder="Tu nombre en el banco...">
                </div>

                <div class="form-group">
                    <label>Fondo de Pantalla Personalizado (Enlace o URL)</label>
                    <input type="text" id="config-bg" placeholder="Pega cualquier enlace de imagen aquí...">
                    <small style="color: #64748b; display: block; margin-top: 8px;">*Déjalo vacío para usar nuestro fondo espacial Premium por defecto.</small>
                </div>

                <div class="form-group">
                    <label>Elige el Color Principal de la Aplicación</label>
                    <div class="color-picker-container">
                        <input type="color" id="config-color" value="#6366f1">
                        <div class="quick-colors">
                            <button class="q-color" style="background:#6366f1" onclick="document.getElementById('config-color').value='#6366f1'"></button>
                            <button class="q-color" style="background:#ef4444" onclick="document.getElementById('config-color').value='#ef4444'"></button>
                            <button class="q-color" style="background:#22c55e" onclick="document.getElementById('config-color').value='#22c55e'"></button>
                            <button class="q-color" style="background:#ec4899" onclick="document.getElementById('config-color').value='#ec4899'"></button>
                            <button class="q-color" style="background:#eab308" onclick="document.getElementById('config-color').value='#eab308'"></button>
                        </div>
                    </div>
                </div>

                <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 35px 0;">

                <button class="btn-save" onclick="guardarAjustes()">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Aplicar y Guardar Cambios
                </button>
            </div>
        </main>
        
    </div>

    <!-- SISTEMA TOAST -->
    <div id="toast-container" class="toast-container"></div>
    <script src="../assets/js/ajustes.js"></script>
</body>
</html>
